name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: swift-actions/setup-swift@v3
        with:
          skip-verify-signature: true

      - name: Build release
        run: swift build -c release -v

      - name: Package release assets
        id: assets
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $candidates = @(
            ".build/x86_64-unknown-windows-msvc/release/moon.exe",
            ".build/release/moon.exe"
          )
          $moonSrc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $moonSrc) { throw "moon.exe not found after build" }

          $moonAsset = "moon-$tag-windows-x86_64.exe"
          Copy-Item $moonSrc $moonAsset
          & ".\$moonSrc" version

          $runtimeRoot = Join-Path $env:LOCALAPPDATA "Programs\Swift\Runtimes"
          $runtimeBin = Get-ChildItem $runtimeRoot -Directory -ErrorAction SilentlyContinue |
            ForEach-Object { Join-Path $_.FullName "usr/bin" } |
            Where-Object { Test-Path $_ } |
            Select-Object -First 1
          if (-not $runtimeBin) { throw "Swift runtime bin not found" }

          $runtimeAsset = "moon-runtime-$tag-windows-x86_64.zip"
          Compress-Archive -Path (Join-Path $runtimeBin "*.dll") -DestinationPath $runtimeAsset -Force

          $stdlibAsset = "moon-stdlib-$tag.zip"
          Compress-Archive -Path "stdlib" -DestinationPath $stdlibAsset -Force

          "files=$moonAsset,$runtimeAsset,$stdlibAsset" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            moon-${{ github.ref_name }}-windows-x86_64.exe
            moon-runtime-${{ github.ref_name }}-windows-x86_64.zip
            moon-stdlib-${{ github.ref_name }}.zip
          generate_release_notes: true